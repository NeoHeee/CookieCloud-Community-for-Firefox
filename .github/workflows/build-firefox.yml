name: Build Firefox Extension

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ext/**"
      - "README.md"
      - "PRIVACY.md"
      - ".github/workflows/build-firefox.yml"
  pull_request:
    paths:
      - "ext/**"
      - "README.md"
      - "PRIVACY.md"
      - ".github/workflows/build-firefox.yml"

permissions:
  contents: read

jobs:
  build-firefox:
    name: Build Firefox Desktop + Android package
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ext

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ext/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: |
          set -o pipefail
          pnpm compile 2>&1 | tee /tmp/typescript-check.log

      - name: Upload TypeScript diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-check-log
          path: /tmp/typescript-check.log
          if-no-files-found: error
          retention-days: 7

      - name: Build Firefox extension
        run: pnpm zip

      - name: Normalize and extract Firefox package
        run: |
          BUILT_ZIP="$(find dist -maxdepth 1 -type f -name '*-firefox.zip' -print -quit)"
          test -n "$BUILT_ZIP"
          RELEASE_ZIP="dist/CookieCloud-Community-for-Firefox-v1.0.4.zip"
          cp "$BUILT_ZIP" "$RELEASE_ZIP"

          rm -rf /tmp/cookiecloud-firefox-package
          mkdir -p /tmp/cookiecloud-firefox-package
          unzip -q "$RELEASE_ZIP" -d /tmp/cookiecloud-firefox-package
          cp /tmp/cookiecloud-firefox-package/manifest.json /tmp/firefox-manifest.json
          test -s /tmp/firefox-manifest.json

      - name: Verify Firefox manifest and icons
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';

          const packageRoot = '/tmp/cookiecloud-firefox-package';
          const manifest = JSON.parse(fs.readFileSync('/tmp/firefox-manifest.json', 'utf8'));
          const settings = manifest.browser_specific_settings;
          const gecko = settings?.gecko;
          const android = settings?.gecko_android;
          const required = gecko?.data_collection_permissions?.required ?? [];

          if (manifest.version !== '1.0.4') throw new Error(`Unexpected version: ${manifest.version}`);
          if (gecko?.id !== 'cookiecloud-firefox@neoheee.github.io') throw new Error('Incorrect Firefox add-on ID.');
          if (android?.strict_min_version !== '120.0') throw new Error('Incorrect Firefox Android minimum version.');

          for (const permission of ['websiteContent', 'browsingActivity']) {
            if (!required.includes(permission)) throw new Error(`Missing data category: ${permission}`);
          }

          const expectedIcons = {
            '16': 'icon/icon-small.svg',
            '32': 'icon/icon-small.svg',
            '48': 'icon/icon.svg',
            '96': 'icon/icon.svg',
            '128': 'icon/icon.svg'
          };

          for (const [size, iconPath] of Object.entries(expectedIcons)) {
            if (manifest.icons?.[size] !== iconPath) {
              throw new Error(`Incorrect manifest icon for ${size}px: ${manifest.icons?.[size]}`);
            }
            if (manifest.browser_action?.default_icon?.[size] !== iconPath) {
              throw new Error(`Incorrect toolbar icon for ${size}px: ${manifest.browser_action?.default_icon?.[size]}`);
            }
          }

          for (const iconPath of new Set(Object.values(expectedIcons))) {
            const fullPath = path.join(packageRoot, iconPath);
            const svg = fs.readFileSync(fullPath, 'utf8');
            if (!svg.includes('<svg') || !svg.includes('xmlns="http://www.w3.org/2000/svg"')) {
              throw new Error(`Invalid SVG namespace: ${iconPath}`);
            }
            if (!/viewBox="0 0 128 128"/.test(svg)) {
              throw new Error(`Missing or incorrect SVG viewBox: ${iconPath}`);
            }
            if (/<script\b|<foreignObject\b|https?:\/\//i.test(svg.replace('http://www.w3.org/2000/svg', ''))) {
              throw new Error(`Unsafe or external SVG content: ${iconPath}`);
            }
          }

          console.log('Firefox manifest and scalable icons verified.');
          NODE

      - name: Lint packaged extension with Mozilla web-ext
        run: pnpm dlx web-ext@8 lint --source-dir /tmp/cookiecloud-firefox-package

      - name: Create AMO source package
        working-directory: .
        run: |
          VERSION="$(node -p "require('./ext/package.json').version")"
          SOURCE_NAME="cookiecloud-community-for-firefox-${VERSION}-source"
          SOURCE_DIR="/tmp/${SOURCE_NAME}"
          SOURCE_ZIP="$GITHUB_WORKSPACE/ext/dist/${SOURCE_NAME}.zip"

          rm -rf "$SOURCE_DIR"
          mkdir -p "$SOURCE_DIR/ext"
          rsync -a \
            --exclude node_modules \
            --exclude dist \
            --exclude .output \
            --exclude .wxt \
            ext/ "$SOURCE_DIR/ext/"
          cp README.md LICENSE PRIVACY.md "$SOURCE_DIR/"

          (cd /tmp && zip -qr "$SOURCE_ZIP" "$SOURCE_NAME")
          test -s "$SOURCE_ZIP"

      - name: Upload Firefox package
        uses: actions/upload-artifact@v4
        with:
          name: cookiecloud-community-for-firefox
          path: ext/dist/CookieCloud-Community-for-Firefox-v1.0.4.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload AMO source package
        uses: actions/upload-artifact@v4
        with:
          name: cookiecloud-community-for-firefox-source
          path: ext/dist/*-source.zip
          if-no-files-found: error
          retention-days: 30
