name: Build Firefox Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ext/**"
      - "PRIVACY.md"
      - ".github/workflows/build-firefox.yml"
  pull_request:
    paths:
      - "ext/**"
      - "PRIVACY.md"
      - ".github/workflows/build-firefox.yml"

permissions:
  contents: read

jobs:
  build-firefox:
    name: Build Firefox Desktop + Android package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ext

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ext/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm compile

      - name: Build Firefox extension
        run: pnpm zip:firefox

      - name: Verify Firefox Desktop and Android manifest
        run: |
          ZIP_PATH="$(find dist -maxdepth 1 -type f -name '*firefox*.zip' -print -quit)"
          test -n "$ZIP_PATH"
          unzip -p "$ZIP_PATH" manifest.json > /tmp/firefox-manifest.json
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const manifest = JSON.parse(
            fs.readFileSync('/tmp/firefox-manifest.json', 'utf8')
          );
          const settings = manifest.browser_specific_settings;
          const gecko = settings?.gecko;
          const geckoAndroid = settings?.gecko_android;
          const required = gecko?.data_collection_permissions?.required ?? [];

          if (manifest.version !== '1.0.4') {
            throw new Error(`Unexpected extension version: ${manifest.version}`);
          }

          if (gecko?.id !== 'cookiecloud-firefox@neoheee.github.io') {
            throw new Error('Firefox extension ID is missing or incorrect.');
          }

          if (geckoAndroid?.strict_min_version !== '120.0') {
            throw new Error('Firefox Android compatibility metadata is missing or incorrect.');
          }

          for (const permission of ['websiteContent', 'browsingActivity']) {
            if (!required.includes(permission)) {
              throw new Error(`Missing Firefox data collection permission: ${permission}`);
            }
          }

          console.log('Firefox Desktop and Android manifest metadata verified.');
          NODE

      - name: Lint packaged extension with Mozilla web-ext
        run: |
          ZIP_PATH="$(find dist -maxdepth 1 -type f -name '*firefox*.zip' -print -quit)"
          rm -rf /tmp/cookiecloud-firefox-lint
          mkdir -p /tmp/cookiecloud-firefox-lint
          unzip -q "$ZIP_PATH" -d /tmp/cookiecloud-firefox-lint
          pnpm dlx web-ext@8 lint --source-dir /tmp/cookiecloud-firefox-lint

      - name: Create AMO source package
        working-directory: .
        run: |
          VERSION="$(node -p "require('./ext/package.json').version")"
          SOURCE_NAME="cookiecloud-${VERSION}-amo-source"
          SOURCE_DIR="/tmp/${SOURCE_NAME}"
          SOURCE_ZIP="$GITHUB_WORKSPACE/ext/dist/${SOURCE_NAME}.zip"

          rm -rf "$SOURCE_DIR"
          mkdir -p "$SOURCE_DIR/ext"

          rsync -a \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.output' \
            --exclude '.wxt' \
            ext/ "$SOURCE_DIR/ext/"

          cp README.md LICENSE PRIVACY.md "$SOURCE_DIR/"

          (
            cd /tmp
            zip -qr "$SOURCE_ZIP" "$SOURCE_NAME"
          )

          test -s "$SOURCE_ZIP"
          echo "Created AMO source archive: $SOURCE_ZIP"

      - name: Upload Firefox package
        uses: actions/upload-artifact@v4
        with:
          name: cookiecloud-firefox-v1.0.4-desktop-android
          path: ext/dist/*firefox*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload AMO source package
        uses: actions/upload-artifact@v4
        with:
          name: cookiecloud-firefox-v1.0.4-amo-source
          path: ext/dist/*amo-source.zip
          if-no-files-found: error
          retention-days: 30
