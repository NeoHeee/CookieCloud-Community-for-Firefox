name: Publish Firefox v1.0.3

on:
  pull_request:
    branches:
      - main
    paths:
      - ".release-trigger/firefox-v1.0.3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Publish signed Firefox XPI
    runs-on: ubuntu-latest
    steps:
      - name: Check out release payload
        uses: actions/checkout@v4

      - name: Reconstruct signed XPI and collect diagnostics
        run: |
          mkdir -p dist
          cat \
            .release-payload/firefox-v1.0.3/payload-00.b64 \
            .release-payload/firefox-v1.0.3/payload-01.b64 \
            .release-payload/firefox-v1.0.3/payload-02.b64 \
            .release-payload/firefox-v1.0.3/payload-03.b64 \
            .release-payload/firefox-v1.0.3/payload-04.b64 \
            .release-payload/firefox-v1.0.3/payload-05.b64 \
            .release-payload/firefox-v1.0.3/payload-06.b64 \
            > /tmp/cookiecloud-firefox.b64
          head -c 29180 \
            .release-payload/firefox-v1.0.3/payload-07.b64 \
            >> /tmp/cookiecloud-firefox.b64

          set +e
          base64 --decode /tmp/cookiecloud-firefox.b64 \
            > dist/CookieCloud-Firefox-v1.0.3-signed.xpi
          DECODE_STATUS=$?
          unzip -t dist/CookieCloud-Firefox-v1.0.3-signed.xpi \
            > /tmp/unzip-test.txt 2>&1
          UNZIP_STATUS=$?
          set -e

          {
            echo "base64_chars=$(wc -c < /tmp/cookiecloud-firefox.b64)"
            echo "decode_status=$DECODE_STATUS"
            echo "xpi_bytes=$(wc -c < dist/CookieCloud-Firefox-v1.0.3-signed.xpi)"
            echo "xpi_sha256=$(sha256sum dist/CookieCloud-Firefox-v1.0.3-signed.xpi | awk '{print $1}')"
            echo "expected_bytes=258134"
            echo "expected_sha256=77a59ab3a5d51452f2b1e5236e3ba010c99e4fa45334b470ec0194c3635e71dd"
            echo "unzip_status=$UNZIP_STATUS"
            echo "signature_entries:"
            unzip -l dist/CookieCloud-Firefox-v1.0.3-signed.xpi 2>/dev/null | grep 'META-INF/' || true
            echo "unzip_tail:"
            tail -n 10 /tmp/unzip-test.txt || true
          } | tee diagnostics.txt

      - name: Upload release diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: firefox-v1.0.3-release-diagnostics
          path: diagnostics.txt
          if-no-files-found: error
          retention-days: 7

      - name: Verify signed XPI
        run: |
          echo "77a59ab3a5d51452f2b1e5236e3ba010c99e4fa45334b470ec0194c3635e71dd  dist/CookieCloud-Firefox-v1.0.3-signed.xpi" | sha256sum -c -
          test "$(stat -c%s dist/CookieCloud-Firefox-v1.0.3-signed.xpi)" = "258134"
          unzip -t dist/CookieCloud-Firefox-v1.0.3-signed.xpi
          unzip -l dist/CookieCloud-Firefox-v1.0.3-signed.xpi | grep -q "META-INF/manifest.mf"
          unzip -l dist/CookieCloud-Firefox-v1.0.3-signed.xpi | grep -q "META-INF/mozilla.rsa"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/release-notes.md <<'EOF'
          ## CookieCloud Firefox v1.0.3

          Mozilla-signed Firefox Desktop build of CookieCloud, prepared for self-distribution.

          ### 版本亮点
          - Mozilla 正式签名，可直接安装到 Firefox 桌面版
          - 固定扩展 ID：`cookiecloud-firefox@neoheee.github.io`
          - 支持 Cookie 同步，以及用户主动启用后的 Local Storage 同步
          - 数据在浏览器本地加密后上传到用户指定的 CookieCloud 服务端
          - 提供可复现构建说明及 AMO 审核材料

          ### 安装方法
          1. 下载 `CookieCloud-Firefox-v1.0.3-signed.xpi`。
          2. 打开 Firefox 的“扩展和主题”。
          3. 点击齿轮菜单，选择“从文件安装附加组件”。
          4. 选择下载的 XPI 文件并确认安装。

          ### 使用提示
          - 本版本支持并已测试 Firefox Desktop。
          - 本版本尚未声明 Firefox Android 兼容性。
          - Firefox 应使用独立 UUID，不要与 Chrome 或 Edge 上传端共用同一 UUID。
          - 建议通过 HTTPS 使用自建 CookieCloud 服务端。
          - 不建议同步网银、支付、主邮箱、密码管理器及管理后台等高敏感账户。

          SHA256：
          `77a59ab3a5d51452f2b1e5236e3ba010c99e4fa45334b470ec0194c3635e71dd`

          上游项目：https://github.com/easychen/CookieCloud
          隐私说明：https://github.com/NeoHeee/CookieCloud/blob/main/PRIVACY.md
          EOF

          if gh release view firefox-v1.0.3 >/dev/null 2>&1; then
            gh release edit firefox-v1.0.3 \
              --title "CookieCloud Firefox v1.0.3" \
              --notes-file /tmp/release-notes.md
          else
            gh release create firefox-v1.0.3 \
              --target main \
              --title "CookieCloud Firefox v1.0.3" \
              --notes-file /tmp/release-notes.md
          fi

          gh release upload firefox-v1.0.3 \
            dist/CookieCloud-Firefox-v1.0.3-signed.xpi \
            --clobber
